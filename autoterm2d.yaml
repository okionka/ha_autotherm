substitutions:
  name: "autoterm2d"
  friendly_name: "Autotherm 2D"
  device_ip:  "192.168.7.6"
  gateway_ip: "192.168.7.1"

# ── External component ────────────────────────────────────────────────────────
external_components:
  - source: github://okionka/ha_autoterm@main
    components: [autoterm2d]
    refresh: always

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── Logging ───────────────────────────────────────────────────────────────────
# Global DEBUG so per-component tags work.
# controller / heater  – raw frame hex (DEBUG)
# autoterm2d          – interpreted protocol + climate events (DEBUG)
# Everything else      – reduce to INFO to avoid noise
logger:
  baud_rate: 0
  level: DEBUG
  logs:
    api: INFO
    api.connection: INFO
    mqtt: INFO
    wifi: INFO
    ota: INFO
    safe_mode: INFO
    mdns: INFO
    web_server: INFO
    captive_portal: INFO
    sensor: INFO
    text_sensor: INFO
    climate: INFO

# ── Home Assistant API ────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret api_encryption_key

# ── OTA ───────────────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password

# ── WiFi ──────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: ${device_ip}
    gateway: ${gateway_ip}
    subnet: 255.255.255.0
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  local: true

# ── Buttons ───────────────────────────────────────────────────────────────────
button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: template
    name: "Status Report"
    entity_category: diagnostic
    icon: mdi:clipboard-text-search
    on_press:
      lambda: id(diesel_heater)->publish_status_report();

# ── UART ──────────────────────────────────────────────────────────────────────
# UART1: Physical controller panel side (GPIO1 TX → panel, GPIO3 RX ← panel)
#   Handled by ControllerPanelComponent: forwards panel bytes to UART2 TX,
#   logs raw frames. No injection, no modification.
uart:
  - id: uart_1_controller
    baud_rate: 9600
    tx_pin: GPIO1
    rx_pin: GPIO3

# UART2: Physical heater side (GPIO17 TX → heater, GPIO16 RX ← heater)
#   Handled by Autoterm2DClimate: forwards heater bytes to UART1 TX,
#   parses protocol, manages Climate entity, sends HA commands to heater.
  - id: uart_2_heater
    baud_rate: 9600
    tx_pin: GPIO17
    rx_pin: GPIO16

# ── Room temperature sensor (current_temperature in HA) ───────────────────────
# Any ESPHome sensor works: homeassistant, dht, dallas, etc.
sensor:
  - platform: homeassistant
    id: room_temperature
    entity_id: sensor.living_room_temperature   # ← change to your HA sensor
    unit_of_measurement: "°C"
    filters:
      - filter_out: nan

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal %"
    filters:
      - lambda: return min(max(2.0f * (x + 100.0f), 0.0f), 100.0f);
    unit_of_measurement: "%"
    entity_category: diagnostic
    device_class: ""

  - platform: uptime
    type: seconds
    name: "Uptime"
    entity_category: diagnostic

# ── Climate entity ────────────────────────────────────────────────────────────
climate:
  - platform: autoterm2d
    id: diesel_heater
    name: "Diesel Heater"

    # UART2 = heater bus (Autoterm2DClimate reads from here)
    uart_id: uart_2_heater
    # UART1 = controller panel bus (ControllerPanelComponent reads from here)
    panel_uart_id: uart_1_controller

    # Current temperature source
    temperature_sensor: room_temperature

    # By T Air mode: HA sensor → sent as 0x11 to heater when preset active
    # Max 2 °C change per sensor update, NaN/out-of-range values rejected.
    air_temperature_source: room_temperature   # ← change as needed

    # ── Status / control ─────────────────────────────────────────────────────
    status_text:
      name: "Heater Status"

    power_level:
      name: "Heater Power Level"

    # ── Diagnostic ───────────────────────────────────────────────────────────
    status_code:
      name: "Heater Status Code"
      entity_category: diagnostic

    error_code:
      name: "Heater Error Code"
      entity_category: diagnostic

    error_text:
      name: "Heater Error"
      entity_category: diagnostic

    software_version:
      name: "Heater Firmware Version"
      entity_category: diagnostic

    status_report:
      name: "Heater Status Report"
      entity_category: diagnostic

    heater_board_temperature:
      name: "Heater Board Temperature"
      entity_category: diagnostic

    battery_voltage:
      name: "Heater Battery Voltage"
      entity_category: diagnostic

    air_temperature:
      name: "Heater Air Temperature"

    panel_temperature:
      name: "Panel Temperature"
      entity_category: diagnostic

    ventilation_power:
      name: "Ventilator Power"
      entity_category: diagnostic
