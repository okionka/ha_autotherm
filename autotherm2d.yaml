substitutions:
  name: "autotherm2d"
  friendly_name: "Autotherm 2D"
  device_ip:      "192.168.7.6"
  gateway_ip:     "192.168.7.1"

# ── External component ───────────────────────────────────────────────────────
external_components:
  - source: github://okionka/ha_autotherm@main
    components: [autotherm2d]
    refresh: always

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false

# ── Platform ──────────────────────────────────────────────────────────────────
esp32:
  board: esp32dev
  framework:
    type: arduino

# ── Logging ───────────────────────────────────────────────────────────────────
logger:
  baud_rate: 0
  level: INFO            # Global level – keep INFO to avoid noise
  logs:
    controller: DEBUG    # UART from panel → heater
    heater: DEBUG        # UART from heater → panel
    autotherm2d: DEBUG   # Component internals (TX frames, parser warnings)

# ── Home Assistant API ────────────────────────────────────────────────────────
api:
  encryption:
    key: !secret api_encryption_key

# ── OTA ───────────────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password

# ── WiFi ──────────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: ${device_ip}
    gateway: ${gateway_ip}
    subnet: 255.255.255.0
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  local: true

# ── Restart button ────────────────────────────────────────────────────────────
button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: template
    name: "Status Report"
    entity_category: diagnostic
    icon: mdi:clipboard-text-search
    on_press:
      lambda: id(diesel_heater)->publish_status_report();

# ── UART ──────────────────────────────────────────────────────────────────────
uart:
  # UART 1 – physical controller panel (transparent pass-through only)
  - id: uart_1_controller
    baud_rate: 9600
    tx_pin: GPIO1
    rx_pin: GPIO3
    debug:
      direction: RX
      dummy_receiver: true
      after:
        delimiter: "\r\n"
      sequence:
        - uart.write:
            id: uart_2_heater
            data: !lambda return bytes;
        - lambda: |-
            ESP_LOGD("controller", "→ heater:");
            UARTDebug::log_hex(direction, bytes, ':');

  # UART 2 – heater bus (read & written by climate component)
  - id: uart_2_heater
    baud_rate: 9600
    tx_pin: GPIO17
    rx_pin: GPIO16
    debug:
      direction: RX
      dummy_receiver: true     # uart_debug consumes bytes; we feed them to the component via lambda
      after:
        delimiter: "\r\n"
      sequence:
        - uart.write:
            id: uart_1_controller
            data: !lambda return bytes;
        - lambda: |-
            ESP_LOGD("heater", "→ controller:");
            UARTDebug::log_hex(direction, bytes, ':');
            // Feed bytes into the autotherm2d parser
            for (uint8_t b : bytes) {
              id(diesel_heater)->process_incoming_byte(b);
            }

# ── Room temperature sensor ────────────────────────────────────────────────────
# Pull any sensor entity from Home Assistant.
# Replace "sensor.living_room_temperature" with your actual entity_id.
# You can also use a local ESPHome sensor (e.g. DHT22, DS18B20) – just
# give it an id and reference that id under climate → temperature_sensor.
sensor:
  - platform: homeassistant
    id: room_temperature
    entity_id: sensor.living_room_temperature   # ← change to your HA sensor
    unit_of_measurement: "°C"
    filters:
      - filter_out: nan

  # ── Diagnostic / system sensors ──────────────────────────────────────────
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal %"
    filters:
      - lambda: return min(max(2.0f * (x + 100.0f), 0.0f), 100.0f);
    unit_of_measurement: "%"
    entity_category: diagnostic
    device_class: ""

  - platform: uptime
    type: seconds
    name: "Uptime"
    entity_category: diagnostic

# ── Climate entity ────────────────────────────────────────────────────────────
climate:
  - platform: autotherm2d
    id: diesel_heater          # referenced from UART debug lambda
    name: "Diesel Heater"
    uart_id: uart_2_heater

    # ── Room thermometer (current_temperature display in HA) ────────────────
    temperature_sensor: room_temperature

    # ── By T Air: HA sensor → sent as 0x11 to heater when active ───────────
    # The component smooths large temperature jumps (max 2 °C per update).
    # Leave out (or set to same as temperature_sensor) if not needed.
    air_temperature_source: room_temperature   # ← change to your preferred sensor

    # ── Status / control sensors ────────────────────────────────────────────
    status_text:
      name: "Heater Status"

    power_level:
      name: "Heater Power Level"

    # ── Diagnostic sensors ──────────────────────────────────────────────────
    status_code:
      name: "Heater Status Code"
      entity_category: diagnostic

    error_code:
      name: "Heater Error Code"
      entity_category: diagnostic

    error_text:
      name: "Heater Error"
      entity_category: diagnostic

    software_version:
      name: "Heater Firmware Version"
      entity_category: diagnostic

    status_report:
      name: "Heater Status Report"
      entity_category: diagnostic

    heater_board_temperature:
      name: "Heater Board Temperature"
      entity_category: diagnostic

    battery_voltage:
      name: "Heater Battery Voltage"
      entity_category: diagnostic

    air_temperature:
      name: "Heater Air Temperature"

    panel_temperature:
      name: "Panel Temperature"
      entity_category: diagnostic

    ventilation_power:
      name: "Ventilator Power"
      entity_category: diagnostic
